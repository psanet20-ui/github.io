<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MBTI 성격 테스트</title>
  <style>
    :root {
      --bg1: #f8f3ff;
      --bg2: #f1e9ff;
      --card: rgba(255, 255, 255, 0.92);
      --text: #2f2942;
      --muted: #6e6885;
      --line: #e1d7ff;
      --accent: #7b61ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffffff 0%, rgba(255, 255, 255, 0) 35%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    .card {
      width: min(100%, 720px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px 28px;
      box-shadow: 0 18px 40px rgba(71, 52, 126, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.25;
    }

    p {
      margin: 0;
      line-height: 1.7;
      color: var(--muted);
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: #f4efff;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>MBTI 성격 테스트</h1>
    <p>이 페이지는 앱 운영과 광고 인증을 위한 공식 안내 페이지입니다.</p>
    <div class="actions">
      <a class="primary" href="./privacy-policy.html">개인정보처리방침 보기</a>
      <a class="secondary" href="./app-ads.txt">app-ads.txt 보기</a>
    </div>
  </main>
</body>
</html>
